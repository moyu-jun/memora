# kit-oss 配置
oss:
  enabled: true
  endpoint: http://localhost:9000
  region: us-east-1
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: test-bucket
  path-style-access: true

# kit-security 配置
security:
  enabled: true
  access-expire: 1800     # 30 分钟（秒）
  refresh-expire: 604800  # 7 天（秒）
  exclude-patterns:
    - /auth/login/**
    - /auth/refresh
    - /api/auth/login
    - /api/auth/register
    - /api/async-test/**
    - /api/file/**